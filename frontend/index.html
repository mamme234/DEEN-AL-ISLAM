<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeenMax - Islamic Lifestyle App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root">
        <!-- Beautiful loading screen -->
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-content">
                <!-- Islamic geometric pattern background -->
                <div class="geometric-bg"></div>
                
                <!-- Main content -->
                <div class="loading-box">
                    <!-- Logo -->
                    <div class="logo-container">
                        <div class="logo-icon">
                            <svg viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="45" fill="none" stroke="#2d6a4f" stroke-width="2"/>
                                <path d="M50 15 L50 85 M15 50 L85 50" stroke="#2d6a4f" stroke-width="2"/>
                                <circle cx="50" cy="50" r="15" fill="#2d6a4f"/>
                                <path d="M35 40 L50 30 L65 40 L65 60 L50 70 L35 60 Z" fill="#52b788" opacity="0.3"/>
                            </svg>
                        </div>
                        <h1 class="app-title">DeenMax</h1>
                        <span class="app-version">v3.0</span>
                    </div>

                    <!-- Greeting -->
                    <div class="greeting-section">
                        <p class="salam">السلام عليكم</p>
                        <h2 class="greeting-text">Assalamu Alaikum!</h2>
                        <p class="subtext">May your day be filled with blessings and peace</p>
                    </div>

                    <!-- Animated Loading -->
                    <div class="loading-wrapper">
                        <div class="loading-spinner">
                            <div class="spinner-ring"></div>
                            <div class="spinner-ring"></div>
                            <div class="spinner-ring"></div>
                        </div>
                        <div class="loading-bar">
                            <div class="loading-progress" id="progressBar"></div>
                        </div>
                        <p class="loading-status">Loading your spiritual journey...</p>
                    </div>

                    <!-- Quick Stats Placeholder -->
                    <div class="quick-stats">
                        <div class="stat-item">
                            <span class="stat-icon">🕌</span>
                            <span class="stat-label">Prayer</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">📖</span>
                            <span class="stat-label">Quran</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">🤲</span>
                            <span class="stat-label">Du'as</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">❤️</span>
                            <span class="stat-label">Community</span>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="loading-footer">
                    <p>Powered by faith ❤️</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simulate loading progress
        let progress = 0;
        const progressBar = document.getElementById('progressBar');
        
        function updateProgress() {
            if (progress < 100) {
                progress += Math.random() * 3;
                if (progress > 100) progress = 100;
                progressBar.style.width = progress + '%';
                setTimeout(updateProgress, 200);
            }
        }
        
        // Start progress animation
        updateProgress();
        
        // Check if backend is available
        async function checkBackend() {
            try {
                const response = await fetch('/api/dashboard');
                if (response.ok) {
                    // Backend is ready, redirect or show app
                    setTimeout(() => {
                        window.location.href = '/app';
                    }, 1000);
                }
            } catch (error) {
                // Keep showing loading with retry
                console.log('Waiting for backend...');
                setTimeout(checkBackend, 3000);
            }
        }
        
        // Start checking for backend
        setTimeout(checkBackend, 2000);
    </script>
</body>
</html>
